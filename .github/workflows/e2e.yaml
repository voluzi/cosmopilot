name: E2E Tests

permissions:
  contents: read

on:
  pull_request:
    branches: [ main ]
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
  push:
    branches: [ main ]
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
  workflow_dispatch:
    inputs:
      focus:
        description: 'Ginkgo focus filter (regex pattern)'
        required: false
        default: ''
      skip:
        description: 'Ginkgo skip filter (regex pattern)'
        required: false
        default: ''

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Checkout Cosmosigner dependency
        uses: actions/checkout@v7
        with:
          repository: voluzi/cosmosigner
          ref: 8fc8dc8e7a2c337cf88faff67ab8ba9cd14f708e
          path: .ci/cosmosigner
          persist-credentials: false

      - name: Configure kernel parameters
        run: |
          sudo tee /etc/sysctl.d/99-kubernetes.conf <<EOF
          fs.inotify.max_user_watches=1048576
          fs.inotify.max_user_instances=8192
          net.ipv4.ip_unprivileged_port_start=0
          EOF
          sudo sysctl -p /etc/sysctl.d/99-kubernetes.conf

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build Cosmosigner dependency
        run: docker build -t ghcr.io/voluzi/cosmosigner:0.2.0 .ci/cosmosigner

      - name: Run E2E Tests
        run: |
          make test.e2e \
            COSMOSIGNER_IMAGE=ghcr.io/voluzi/cosmosigner:0.2.0 \
            TEST_TIMEOUT=1h \
            PROCS=4 \
            REUSE_CLUSTER=false \
            FOCUS="${{ github.event.inputs.focus || '' }}" \
            SKIP="${{ github.event.inputs.skip || '' }}"
