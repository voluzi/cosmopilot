version: 2
updates:
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
    groups:
      go-dependencies:
        patterns:
          - "*"
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      github-actions:
        patterns:
          - "*"
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
    groups:
      docker-dependencies:
        patterns:
          - "*"
  - package-ecosystem: helm
    directory: /charts
    schedule:
      interval: weekly
    groups:
      helm-dependencies:
        patterns:
          - "*"
  - package-ecosystem: npm
    directory: /docs
    schedule:
      interval: weekly
    groups:
      npm-dependencies-docs:
        patterns:
          - "*"