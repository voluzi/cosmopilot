                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              cosmosignerAtEstablishment:
                description: |-
                  CosmosignerAtEstablishment is a write-once record of the managed signer's effective signing
                  identity at the moment the chain ID was first recorded (empty string when no signer was
                  configured then). It lets the no-webhook reconcile path tell a signer that was part of the
                  establishing configuration (admitted) apart from one whose identity was introduced afterwards
                  (rejected unless the backend provably imports the registered key). Not meant to be set by hand.
                type: string
              cosmosignerReplicas:
                description: |-
                  CosmosignerReplicas records the raft replica count the managed signer was rolled out with,
                  captured for every signer (validator and sentry alike). It lets the no-webhook reconcile path
                  reject a later replica change: scaling the embedded raft cluster is not a plain Kubernetes scale,
                  since the membership baked into the existing per-pod raft state is not migrated by rendering a
                  new bootstrap list. Not meant to be set by hand.
                format: int32
                type: integer
              cosmosignerSigningDigest:
                description: |-
                  CosmosignerSigningDigest is a controller-recorded fingerprint of the managed cosmosigner's
                  effective signing identity, captured once the chain is established, so the no-webhook reconcile
                  path can reject a later change or removal of the signing configuration. Not meant to be set by
                  hand.
                type: string
              dataUsage:
                description: Usage percentage of data volume.
                type: string
              genesisSigningDigest:
                description: |-
                  GenesisSigningDigest is a controller-internal fingerprint of the genesis-initializing validator's
                  signing material and init config, recorded when this node initializes genesis. It lets the
                  no-webhook reconcile path reject post-genesis changes to .spec.validator.init without a previous
                  spec to diff against. Set only for genesis-initializing validators; not meant to be set by hand.
                type: string
              ip:
                description: Internal IP address of this node.
                type: string
              jailed:
                description: Indicates if this validator is jailed. Always false if
                  not a validator node.
                type: boolean
              latestHeight:
                description: Last height read on the node by cosmopilot.
                format: int64
                type: integer
              nodeID:
                description: Indicates this node's ID.
                type: string
              phase:
                description: Indicates the current phase for this ChainNode.
                type: string
              pubKey:
                description: Public key of the validator.
                type: string
              publicAddress:
                description: Public address for P2P when enabled.
                type: string
              pvcSize:
                description: Current size of the data PVC for this node.
                type: string
              seedMode:
                description: Indicates if this node is running with seed mode enabled.
                type: boolean
              upgrades:
                description: All scheduled/completed upgrades performed by cosmopilot
                  on this ChainNode.
                items:
                  description: Upgrade represents an upgrade processed by cosmopilot
                    and added to status.
                  properties:
                    height:
                      description: Height at which the upgrade should occur.
                      format: int64
                      type: integer
                    image:
                      description: Container image replacement to be used in the upgrade.
                      type: string
                    source:
                      description: Where cosmopilot got this upgrade from.
                      type: string
                    status:
                      description: Upgrade status.
                      type: string
                  required:
                  - height
                  - image
                  - source
                  - status
                  type: object
                type: array
              validator:
                description: Indicates if this node is a validator.
                type: boolean
              validatorAddress:
                description: Validator address is the valoper address of this validator.
                  Omitted when not a validator.
                type: string
              validatorStatus:
                description: Indicates the current status of validator if this node
                  is one.
                type: string
            required:
            - validator
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
