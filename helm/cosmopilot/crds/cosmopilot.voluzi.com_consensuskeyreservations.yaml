            required:
            - chainID
            - claim
            - namespace
            - ownerKind
            - ownerName
            - ownerUID
            - publicKey
            type: object
            x-kubernetes-validations:
            - message: consensus key reservations are immutable; delete only after
                proving every old signing path is stopped
              rule: self == oldSelf
        required:
